name: Deploy Plugin Library Wiki To Github Pages + Netlify

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/workflows/update-library.yml'
      - libraries.json
  schedule:
    - cron: '0 * * * *'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 'latest'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Restore Plugin Cache
        uses: actions/checkout@v6
        with:
          ref: cache
          path: cache
          fetch-depth: 1

      - name: Build Library
        run: |
          pnpm run build
          pnpm run fetch-plugins -- --allow-ci --best-effort
          pnpm run build:library

      - name: Ensure root site entry exists
        run: |
          if [ ! -f dist/index.html ]; then
            cat > dist/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>TiddlyWiki CPL</title>
              <style>
                body { font-family: system-ui, sans-serif; margin: 0; padding: 32px; background: #f8fafc; color: #0f172a; }
                main { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(15,23,42,.08); }
                a { color: #2563eb; }
                .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
                .actions a { text-decoration: none; padding: 10px 16px; border-radius: 999px; font-weight: 600; }
                .primary { background: #2563eb; color: #fff; }
                .secondary { background: #e2e8f0; color: #0f172a; }
              </style>
            </head>
            <body>
              <main>
                <p style="margin:0 0 8px; color:#64748b; text-transform:uppercase; letter-spacing:.08em; font-size:.9rem;">TiddlyWiki CPL</p>
                <h1 style="margin:0 0 12px;">CPL Web UI Fallback</h1>
                <p style="margin:0; color:#475569;">The main wiki UI was not generated for this deployment, but the CPL mirror repository and client plugin are still available below.</p>
                <div class="actions">
                  <a class="primary" href="repo/">Open repo mirror landing page</a>
                  <a class="secondary" href="repo/plugins/Gk0Wk_CPL-Repo.json">Download CPL client plugin</a>
                </div>
              </main>
            </body>
          </html>
          EOF
          fi

    #   - name: Minify Front Page HTML (also check if it exists)
    #     run: pnpm exec html-minifier-terser -c ./html-minifier-terser.config.json -o dist/index.html dist/index.html
    #   - name: Minify Library HTML (also check if it exists)
    #     run: pnpm exec html-minifier-terser -c ./html-minifier-terser.config.json -o dist/library/index.html dist/library/index.html

      - name: Add history version from cache to library
        run: |
          rm -rf cache/.git
          cp -r cache/plugins dist/repo

      - name: Save Plugin Cache
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: cache
          FOLDER: cache
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make offline cache
        run: pnpm exec workbox injectManifest workbox-config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload entire repository
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - uses: jsmrcaga/action-netlify-deploy@v2.4.0
        with:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_PERSONAL_ACCESS_TOKEN }}
          NETLIFY_DEPLOY_TO_PROD: true
          NETLIFY_SITE_ID: 97bd95f9-9e7e-4259-a883-c19fa3df2d20
          build_directory: ./dist
          NETLIFY_DEPLOY_MESSAGE: "Deployed from GitHub action"
          install_command: "echo Skipping installing the dependencies"
          build_command: "echo Skipping building the web files"
