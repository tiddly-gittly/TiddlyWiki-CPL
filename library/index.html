 the screen\n# Sidebar tabs are turned into draggable, removable, and minimize-able \"card\"-things\n\n''Changes to the sidebar tabs:''\n\n# Draggable = click on the card title + drag above or below other \"cards\" in the sidebar\n# Removable = hover on card title + click the right-most button that appears\n# Minimize-able = click on the card title (expand by clicking again)\n* The card title is the \"caption\" of the tiddler. Otherwise, it's the tiddler title\n\n''~PageControls:''\n\n* ~PageControls appear beside the hamburger button on hover (when sidebar is expanded), or below it when sidebar is \"minimized\"\n\n//Note:// \n\nThis theme is best used with [[Very Simple Mobile Layout (plugin)|http://j.d.tiddlyspot.com/#Very%20Simple%20Mobile%20Layout%20(plugin)]].\n\n<a target=\"blank\" href=\"http://j.d.whitespace.tiddlyspot.com\">Project Homepage on Tiddlyspot</a>",version:"0.0.18","plugin-type":"theme",dependents:"$:/themes/tiddlywiki/vanilla","core-version":">=5.1.17","requires-reload":!1,type:"application/json"},{title:"$:/themes/jd/Material",author:"JD",name:"Material",description:"Not-quite-there-yet quantum paper for TW5",readme:"Hello, this [[TW5|https://tiddlywiki.com/]] theme is inspired by Google's ''Material Design''\n\nWhen updating, you might want to delete this config tiddler first: $:/themes/jd/Material/ConfigDB\n<br><em class=\"tc-muted\">the above shadow tiddler gets overwritten when tweaking this theme at the control panel</em>\n\nYou can always get the latest updates here:\n\nhttp://j.d.material.tiddlyspot.com/\n\nPlease report bugs / suggest anything here:\n\nhttps://github.com/jdjdjdjdjdjd/TW5-Material\n\nGoogle Groups discussion:\n\nhttps://groups.google.com/forum/#!topic/TiddlyWiki/qiS1Vs46EQw%5B1-25%5D\n\nMy other TW5 stuff:\n\nhttp://j.d.tiddlyspot.com/",version:"0.4.14","plugin-type":"theme",dependents:"$:/themes/tiddlywiki/vanilla","core-version":">=5.1.14","requires-reload":!1,type:"application/json"},{title:"$:/plugins/HCHaase/TOCgeneric",author:"HC Haase",name:"TOC Generic",description:"TOC Generic - adds extended TOC to the bottom of tiddlers",readme:"<$button class=\"tc-btn-invisible\" message=\"tm-open-external-window\" param=\"https://hchaase.github.io/HC-Plugins/\">{{$:/core/images/github}} <$text text=\"https://hchaase.github.io/HC-Plugins/\"/></$button><br/>This plugin is meant to show connections up front, and to act as a better table of content on index tiddlers. It has the core features:\n\n* at the bottom of every tiddler'' all references is shown'' in lists.\n** tags\n** backlinks\n** Freelinks\n** list (the content of the list field of the present tiddler)\n** listed (other tiddlers that have the tiddler in there list field)\n* ''all lists are collapsible''. All sublists can be closed/opened by clicking on the header for the list. \n* ''all lists are conditional'', the lists will ONLY appear if there is something in them (e.g. if you don't see the backlink list, it is because there are no backlinks to that tiddler)\n** if no tags/links/list/listed are present nothing is shown. The primary toggle (references button) is also hidden\n*'' show content of all tiddlers'' (transclusions) in the lists (1. button to the right of \"references\")\n** also recursive through the tags table of content\n** hide all content with a button at the end of lists (handy for long lists)\n** the grey text-box is a link to the tiddler\n* ''show content of individual tiddlers'' (transclusions) in the lists (activate with 2. button to the right of \"references\" and toggle at each individual tiddler in the list)\n* ''show modified/created date'' in bottom right corner of transcluded tiddlers (toggle in settings)\n\nin addition it is \n\n*mobile friendly\n** no hover (better for touchscreens)\n** vertical layout with few clicks (better for scrolling)\n*print friendly\n** buttons is hidden on print\n** if something is collapsed, or everything is collapsed, the button are also hidden on print\n*customisable\n** name of primary \"references\" heading/button is changeable in the [[settings|$:/plugins/HCHaase/TOCgeneric/settings]]\n** default visibility for lists is changeable in [[settings|$:/plugins/HCHaase/TOCgeneric/settings]]\n\nYou can customise the look and function in the [[settings|$:/plugins/HCHaase/TOCgeneric/settings]] to fit your needs.\n\n\n!! Why I made this\n\nThis was inspired by the forum discussion on [[bi-directional linking|https://groups.google.com/forum/#!topic/tiddlywiki/LUVTps01UBU]] to show tiddler connection better.\n\nThis is an attempt to make all connections more visible for all tiddlers. You can see the same information in the info panel of the tiddlers, but this hopefully make the connections stand out more.\n\n!! Acknowledgement\n\nThanks to\n\n* David Gifford (transclusion taken from the  [[TiddlyBlink edition|https://giffmex.org/gifts/tiddlyblink.html]])\n* Mohammad for help with [[filtering|https://groups.google.com/forum/#!topic/tiddlywiki/tOeRa6973As]]\n* TonyM for help with [[custom exclusion of tiddlers|https://groups.google.com/d/msg/TiddlyWiki/KZWhS-BtZCQ/WWpDZIREBQAJ]] (coming soon)\n* Akhator (freelinks filter copied from  [[TWCrossLinks|https://akhater.github.io/drift/#%24%3A%2Fak%2Fplugins%2FTWCrossLinks]])\n\n\nI and David developed our plugins around the same time, but when I stopped, David continued to develop lots of cool features, so I borrowed a little from him. The code for transcluding tiddler content is adopted form David Gifford's [[TiddlyBlink edition|https://giffmex.org/gifts/tiddlyblink.html]]. \n\n!!!!What's the difference  between TiddlyBlink and TOC generic?\nTiddlyBlink is more focused on linking and have a complete setup for building a link centred wiki. The TOC generic plugin can use ''tags ''as well as links and are more focused on showing information and connections, not editing. TOC generic is a plugin and can be used in any wiki with a pre-existing organisation.\n\n!! Road map\n\nAt some point I want to \n\n*~~ incorporate transclusions from Daves BiLink plugin~~\n*~~toggle transclusion for individual list items~~\n* make a alternative sort button\n* colour code boxes according to tags (or other stuff??)( make a tag picker secondary/tetriary sorter/indexer)\n* Add an exclude-filter (e.g. exclude advanced search)\n* (maybe) make toc by custom (input) filter (like Pmario's tocp) / use any field sorting to make a toc\n* (maybe) Add set start of toc like Tonys example (https://groups.google.com/forum/#!topic/TiddlyWiki/wijV7wNnwpQ)",version:"2.2.1","plugin-type":"plugin","core-version":"5.1.21","requires-reload":!1,type:"application/json"},{title:"$:/plugins/jd/mobvsimp",author:"JD",name:"mobvsimp",description:"JD Mobile Layout - very basic",readme:"<b>This plugin is incompatible with <a target=\"blank\" href=\"http://j.d.simplemobile.tiddlyspot.com\">JD Mob</a>, please don't use them at the same time.</b>\n\nThis is a mobile layout that applies to narrow screens. It introduces the following:\n\n# A Searchbar\n\n# A Bottombar containing ''Top Left Bar'', ''Page Control'', ''Mob-only'', and ''Top Right Bar'' buttons (in that order)\n#**  ''Top Left Bar'' >> buttons tagged ''~$:/tags/TopLeftBar''\n#**  ''Page control'' >> buttons tagged ''~$:/tags/PageControls''\n#**  ''Mob-only'' >> other buttons tagged ''~$:/tags/jd/mobbutton''\n#**  ''Top Right Bar'' >> buttons tagged ''~$:/tags/TopRightBar''\n#**  Buttons you don't want to appear here should be tagged ''~$:/tags/jd/mobno'' \n#*** For example, you can use this on page control buttons you want to appear in desktop layout but not in mobile layout\n\n//Note:// \n\nThis layout is tied to the ''Sidebar Breakpoint'' set at ''Control Panel'' >> ''Appearance'' >> ''Theme Tweaks''.\n\nThis layout is compatible with any core theme as of release date.\n\n<a target=\"blank\" href=\"http://j.d.simplemobile.tiddlyspot.com\">Project Homepage on Tiddlyspot</a>\n\n!! Version History\n\n!!! 2017-11-22 Release of version 1.0.0",version:"1.0.0","plugin-type":"plugin","core-version":">=5.1.14","requires-reload":!1,type:"application/json"},{title:"$:/plugins/BurningTreeC/KeeBoord",author:"Simon Huber",name:"KeeBoord",description:"KeeBoord - A plugin for global keyboard shortcuts",readme:"This plugin enhances ~TiddlyWiki5 with global keyboard shortcuts\n\nIt's recommended to use version 5.1.17 or newer of ~TiddlyWiki5\n\n",version:"5.1.17","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/jd/plainrevs",author:"JD",name:"plainrevs",description:"Plain Revisions",readme:"This plugin is a simple versioning system for edited tiddlers, recorded as they are saved. It works though the following buttons:\n\n* {{$:/plugins/jd/plainrevs/images/done-button}} will not just save the tiddler as usual, but will also save the previous version of that tiddler (all fields including //tags//, except //title//).\n\n* {{$:/plugins/jd/plainrevs/images/delete-button}} will not just delete the tiddler as usual, but will also delete that tiddler's revisions.\n\nA ''Revisions'' tab can be found under ''info'' {{$:/core/images/info-button}}, and from there the following actions can be done to each revision:\n\n* → / ↓ : show the revision list as horizontal or vertical tabs\n* ''(show differences)'' / ''(hide differences)'' : shows/hides the differences between the revision and the current state of the tiddler.\n* ''(restore)'' : replace the current state of the tiddler with that revision (all fields including //tags//, except //title//).\n* ''(pin)'' / ''(unpin)'' : makes it so that the revision will not be deleted when the source tiddler is deleted, nor when the user-defined limit of revisions is reached.\n* ''(delete)'' : deletes that revision, pinned or not.\n\n!!! ''Changing the source tiddler's title''\n\n* The source tiddler's title may be changed; its rev tiddlers will always follow it as long as \"//Update (oldtitle) to (newtitle) in the tags and list fields of other tiddlers//\" is checked when editing the source tiddler's title.\n\n!!! ''Blacklisting''\n\nThe ''keep-rev'' field of a tiddler will define how many revisions will be kept for that tiddler. Defaults to 3 if the field does not exist, or if it is empty. Here are other possible values for the field:\n\n* `no`: no revision will be saved\n\n* `all`: all revisions will be saved / no limit\n\n* `0`: same as \"all\". Use \"no\" instead if no revision should be kept\n\n* any `integer` greater than `0`: that number of revisions will be saved\n\n!!! ''Rev tiddler structure''\n\n```\ntitle: $:/rev/<<now YYYY0MM0DD.0hh:0MM:0ss>>\nlist: [[Title of source tiddler]]\nrev-list: listItems [[inside list field]] of [[source tiddler]]\nrev-tags: [[tag 1]] tag2\nrev-someotherfield: someotherfield's value\n... and all other fields of source tiddler, to be prefixed 'rev-'\n```\n\nIf  the title already exists, it is incremented numerically. \n\nRestoring the revision will re-copy the stored rev-fields (the \"rev-\" prefix will be removed). \n\n!!! ''Notes''\n\nThe ~$:/core ''save'' and ''delete'' buttons are neither replaced nor overwritten. You can still use them alongside this plugin's buttons by setting their visibility at ~$:/ControlPanel > Appearance > Toolbars\n\n<a target=\"blank\" href=\"http://j.d.revisions.tiddlyspot.com/\">Project Homepage on Tiddlyspot</a>",version:"0.0.20","plugin-type":"plugin","core-version":">=5.1.17","requires-reload":!1,type:"application/json"},{title:"$:/plugins/ahahn/tinka",author:"Andreas Hahn",name:"Tinka",description:"An easy plugin packer",readme:"<$button class=\"tc-btn-invisible\" message=\"tm-open-external-window\" param=\"https://tinkaplugin.github.io\">{{$:/core/images/github}} <$text text=\"https://tinkaplugin.github.io\"/></$button><br/>This is a Control Panel extension that aims to simplify the plugin creation and editing process. After installing, you will find a new tab in your control panel that makes creating and modifying plugins a little bit easier.\n\n<a target=\"blank\" href=\"http://tinkaplugin.github.io\">Project Homepage on tinkaplugin.github.io</a>\n\n!! Version History\n\n!!! 2020-08-03 Release of version 0.5.0\n\n''Changelog''\n\n* Fixed graphical glitches with newer versions of TW5\r\n* Reworked the interface for modifying plugins\r\n* Added the ability to select and unselect all search results when adding tiddlers to plugins\r\n* `name` and `description` field are now used for both plugins and themes\r\n* Added default filter to the search\r\n* You can now attach notes to backups\r\n* Renamed control panel tabs\r\n* The version will correctly be set when creating a new plugin\n\n!!! 2017-05-13 Release of version 0.4.0\n\nThis release fixes the following bugs:\n\n''Changelog''\n\n* Themes will now get the correct prefix `$:/themes/` when packaging\r\n* Fixed search results not linking properly\r\n* Added description field when creating a new theme\n\n\r\n!!! 2017-03-01 Release of version 0.3.0\n\nAfter more than a year, Tinka is now on <a target=\"blank\" href=\"http://tinkaplugin.github.io\">github</a> and also released under the [[MIT license|$:/plugins/ahahn/tinka/license]].\n\n''Changelog''\n\n* Packaging success now produces a modal that actively reminds the user to refresh the wiki.\r\n* The search tab state is now kept in a temporary system tiddler.\r\n* Added warning when repackaging themes that are not active.\r\n* The 'Help Tab' functionality is now also available for plugins that do not follow the `$:/plugins/...` naming convention. In particular this applies to themes and core plugins.\r\n* Fixed wrong headings for some modal dialogs.\r\n* Older action widgets remodeled to use the (new) CommonAction widget as a base.\r\n* Fixed error check that prevented users to enter a minimal core version dependency when creating a new plugin.\n\n!!! 2015-09-20 Release of version 0.2.0-beta\n\n''Changelog''\n\n* Added Help-Tab capabilities to quickly navigate between plugin tiddlers.\r\n* Moved Create-Plugin wizard to its own tab.\r\n* Redid Create-Plugin UI to be easier and more accessible.\r\n* Backups can now also be downloaded/exported.\r\n* Added more documentation.\n\n!!! 2015-05-18 Release of version 0.1.0\n\n''Changelog''\n\n* The metadata section now include edit fields for the `name` and `source` fields.\r\n* The //default search// box now only searches for title matches.\r\n* Backups can now be exported/downloaded.\r\n* <div>Backups can now be restored and made active again. If another version of the plugin is already active, the option is given to back it up,before restoring the backup.\n\n\r\n''Warning: For this mechanism to work, there has to be an 'original-title' field present in the backup tiddler. This is automatically added by Tinka, however earlier versions of Tinka did not add this field. If you want to restore a backup from an earlier version of Tinka, you will have to add the 'original-title' field manually and populate it with the former title of the plugin tiddler, in order for the restore function to work.''\r\n</div>\n\n!!! 2015-04-30 Release of version 0.0.2\n\n''Changelog''\n\n* The list of plugin tiddlers is now hidden by default, since some lists can get very long.\r\n* Added a different search option (default/filter)\r\n* Improved Documentation slightly\r\n* Added a backup option, so a plugin can be backed up before repackaging.\n\n   \r\n!!! 2015-04-29 Release of version 0.0.1\r\n",version:"0.5.0","plugin-type":"plugin","core-version":">=5.1.20","requires-reload":!0,type:"application/json"},{title:"$:/plugins/flibbles/relink",author:"Flibbles",name:"Relink",description:"Flexibility when relinking renamed tiddlers",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/flibbles/tw5-relink">{{$:/core/images/github}} <$text text="https://github.com/flibbles/tw5-relink"/></$button><br/>When renaming a tiddler, Relink can update the fields, filters, and widgets\nof all other tiddlers. However, it works through whitelisting.\n\nIt\'s already configured to update tiddler titles for all core widgets, filters,\nand fields, but the whitelists can be customized for each of this in the\nconfiguration panel.\n\nSee <a href={{$:/plugins/flibbles/relink!!source}}>the tw5-relink website</a> for more details and examples.\n',version:"2.1.2","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/flibbles/relink-markdown",author:"Flibbles",name:"Relink Markdown",description:"Markdown support for Relink",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/flibbles/tw5-relink">{{$:/core/images/github}} <$text text="https://github.com/flibbles/tw5-relink"/></$button><br/>Markdown support for Relink.\n\n...or Relink support for Markdown.\n\nThis supplimental plugin allows \'\'text/x-markdown\'\' files to be relinked. This means markdown linking syntax like `[Caption](#MyTiddler)` is supported. If your markdown supports wikitext markup as well, this will handle that too.\n\nThis plugin is designed for `tiddlywiki/markdown`, but it will also work for `anstosa/tw5-markdown` and others.\n',version:"2.1.0","plugin-type":"plugin","parent-plugin":"$:/plugins/flibbles/relink","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/flibbles/relink-titles",author:"Flibbles",name:"Relink Titles",description:"Renames tiddlers with titles derived from Relinked tiddler",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/flibbles/tw5-relink">{{$:/core/images/github}} <$text text="https://github.com/flibbles/tw5-relink"/></$button><br/>Highly customizable relinking of tiddler titles //related// to the renamed tiddler.\n\n* Rename a hierarchy of subtiddlers when renaming a root tiddler.\n* Make custom filter rules to rename other tiddlers the way you want when Relinking.\n* Integrates with other plugins for plugin-specific rules.\n\nSee <a href={{$:/plugins/flibbles/relink-titles!!source}}>the tw5-relink website</a> for more details and examples.\n\n{{$:/core/images/warning}} \'\'Warning:\'\' You must use //Relink// v1.10.2 or greater with this, or this plugin may delete some tiddler bodies while trying to relink titles.\n',version:"2.1.2","plugin-type":"plugin","parent-plugin":"$:/plugins/flibbles/relink","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/tekan",author:"Riz",name:"Tekan",description:"Tekan - Kanban TW",readme:"! Tekan\n\nTekan is a simple kanban client using TW5. ",version:"0.5.13","plugin-type":"plugin","core-version":">=5.1.14","requires-reload":!1,type:"application/json"},{title:"$:/plugins/TheDiveO/FontAwesome",author:"TheDiveO",name:"FontAwesome",description:"FontAwesome embedded font support for TW5",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/TheDiveO/TW5FontAwesome">{{$:/core/images/github}} <$text text="https://github.com/TheDiveO/TW5FontAwesome"/></$button><br/>This plugin adds support for Font Awesome to your ~TiddlyWiki&nbsp;5. It embeds the [[Font Awesome|http://fontawesome.io/]] within this plugin, so you don\'t need to install this font in your operating system. You may, but the //embedded// Font Awesome will take precedence to ensure a consistent user experience.\n\nTo install this plugin in your own ~TiddlyWiki(s), simply drop this [[FontAwesome plugin|$:/plugins/TheDiveO/FontAwesome]] onto your own ~TiddlyWiki(s): this will then import it.',version:"1.2.22","plugin-type":"plugin","core-version":">=5.1.0","requires-reload":!1,type:"application/json"},{title:"$:/plugins/tesseract/Moments",author:"Riz",name:"Moments",description:"Moments: A little color won't hurt",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://ibnishak.github.io/tesseract/">{{$:/core/images/github}} <$text text="https://ibnishak.github.io/tesseract/"/></$button><br/>',version:"0.6.17","plugin-type":"theme",dependents:"$:/themes/tiddlywiki/vanilla","core-version":">=5.1.13","requires-reload":!1,type:"application/json"},{title:"$:/plugins/venomspinner/ghostwriter",author:"Venomspinner",name:"Ghostwriter",description:"A minimalist, mobile responsive theme for blogging",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://ibnishak.github.io/irreverent-mudblood/">{{$:/core/images/github}} <$text text="https://ibnishak.github.io/irreverent-mudblood/"/></$button><br/>',version:"1.0.9","plugin-type":"theme",dependents:"$:/themes/tiddlywiki/vanilla","requires-reload":!1,type:"application/json"},{title:"$:/plugins/tesseract/CleverNote",author:"Riz",name:"CleverNote",description:"CleverNote",version:"1.0.49","plugin-type":"theme",dependents:"$:/themes/tiddlywiki/vanilla","core-version":"5.1.19","requires-reload":!1,type:"application/json"},{title:"$:/plugins/noteself/core",author:"Danielo Rodríguez Rivero",name:"core",description:"Core plugin of NoteSelf",readme:"This is the core plugin of ~NoteSelf.\nIt includes the customizations that make ~NoteSelf what it is. This includes\n\n* Custom UI elements\n* Better mechanism to enhance user experience (ej: login)\n* Some useful stuff like friendly snippets",version:"1.1.0","plugin-type":"plugin","core-version":">=5.1.13","requires-reload":!0,type:"application/json"},{title:"$:/plugins/noteself/online",author:"Danielo Rodríguez Rivero",name:"online",description:"Plugin containing specific configurations for the online version of NoteSelf",version:"1.0.0","plugin-type":"plugin","core-version":">=5.1.13","requires-reload":!1,type:"application/json"},{title:"$:/plugins/bj/plugins/marked",author:"JeffreyWilkinson",name:"plugins",description:"alternative markdown",readme:"<$button class=\"tc-btn-invisible\" message=\"tm-open-external-window\" param=\"https://github.com/buggyj/Tw5-tools\">{{$:/core/images/github}} <$text text=\"https://github.com/buggyj/Tw5-tools\"/></$button><br/>Adapter for the marked markdown parser:\nhttps://github.com/chjj/marked\n\n!!Usage\nWhen creating a tiddler, from the 'type' dropdown select 'text/x-marked'\n\n!!!Advanced Options (with defaults)\n<pre>`  gfm: true,\n  tables: true,\n  breaks: false,\n  pedantic: false,\n  sanitize: false,\n  smartLists: false,\n  silent: false,\n  highlight: null,\n  langPrefix: 'lang-',\n  smartypants: false,\n  headerPrefix: '',\n  renderer: new Renderer,\n  xhtml: false\n`</pre>\n\nAt present advanced options can only be set using the Flexitype plugin.\n",version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/Calendar",author:"JeffreyWilkinson",name:"Calendar",description:"calendar with date formatter addons",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/TW5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/TW5-tools"/></$button><br/>For documentation see the project home at\nhttp://bjtools.tiddlyspot.com#ExtendableCalendar\n',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/visualeditor",author:"JeffreyWilkinson",name:"visualeditor",description:"ckeditor adapter plugin",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/TW5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/TW5-tools"/></$button><br/>!!!Basic Configuration\nThis plugin enables ckeditor to be used in a tiddlywiki. For the Ckeditor license see http://ckeditor.com/about/license\n\nckeditor can be used directly from the web, eg http://cdnjs.cloudflare.com/ajax/libs/ckeditor/4.3.2/ckeditor.js\nor can be obtained directly from http://ckeditor.com/download\n\nNote that this plugin is designed to work with the ckeditor standard packages (but can be configured for custom packages).\n\nThe tiddler $:/plugin/bj/visualeditor/includelib\n\nneeds to contain the location of the ckeditor library. The default is\n\n```\nhttp://127.0.0.1/libs/ckeditor/ckeditor.js\n```\nchange to your location. Note that this can be an online location eg\n\n```\nhttp://cdnjs.cloudflare.com/ajax/libs/ckeditor/4.3.2/ckeditor.js\n\n```\n\n!!!Advanced configuration\nConfiguration options as described on the ckeditor website can be set in the tiddler \n$:/plugins/bj/visualeditor/config.json\nUser styles (also described on the ckeditor website) are included in the tiddler \n$:/plugins/bj/visualeditor/styles.json\n',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/clickaction",author:"JeffreyWilkinson aka BJ",name:"clickaction",description:"click trigger widget",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/TW5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/TW5-tools"/></$button><br/>\n!!The Click Widget\nwatches for writes to tiddler specified in \'state\' and clicks when the it sees the contents matches that specified by\'text\'\n\n!!Usage\ncan be used to click all items on a list \n\n!!Example open all tiddlers with the same tag:\n\n`\n<$button set=<<qualify "$:/state">> setTo="open">Open all tagged</$button> \n<$edit-text tiddler="$:/temp/openall" tag="input" type="text"/>\n\n\n<$list filter="[!has[draft.of]tag{$:/temp/openall}sort[created]]">\n\n<$link><$click state=<<qualify "$:/state">> text="open"/> </$link>\n\n</$list>\n`\n',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/drag-and-drop",author:"Jeffrey Wilkinson aka buggyj",name:"drag-and-drop",description:"drag and drop widgets",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/TW5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/TW5-tools"/></$button><br/>!!!Drag and Drop Widgets\n\nPlugin contains the following widgets\n\n# taglist - re-orderable list of tiddlers with the same tag. Api parameters:\n#* targettag - name of the lists tag\n#* template - The title of a template tiddler for transcluding each tiddler in the list. When no template is specified, the body of the widget serves as the item template. With no body, a simple link to the tiddler is returned.\n#* variable - The name for a variable in which the title of each listed tiddler is stored. Defaults to currentTiddler\n#* nodrop - drops are ignored\n#* htmltag - enclosing html element for list items\n# ondrop - and or remove tags in response to a drop event. Api parameters:\n#* targeTtag name of tag to act with. \n#* tagAction can be set to addtag or removetag\n\nThis plugin also adds ondragover click events to the link and button widgets. \n',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/jsoneditor",author:"Jeffrey Wilkinson (BJ)",name:"jsoneditor",description:"editor of json!",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/tw5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/tw5-tools"/></$button><br/>Presents json as a tree to be edited. Note that on keypress updating is disabled as a default, there is a \'set value\' button that is used to enter values. \n\nOptions are provide via the file: $:/plugins/bj/jsoneditor/options.json. On keypress updating can be switched on but may be slow due to the editor compiling the json. The other option controls the pretty printing indent spacing.\n\nProject home: http://bjtools.tiddlyspot.com\n\nThis widget is an adaption to TW5 of software of the same name. The orignial can be seen here:\n\nhttp://www.thomasfrank.se/downloadableJS/JSONeditor_example.html \n',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/typestemplate",author:"JeffreyWilkinson",name:"typestemplate",description:"enables user templates for each type",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/TW5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/TW5-tools"/></$button><br/>',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/flexitype",author:"Jeffrey Wilkinson",name:"flexitype",description:"flexible types",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/TW5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/TW5-tools"/></$button><br/>Allows a user defined collection of tiddlywiki type parser rules to be associated with a (flexible) type. The flexible type has the form \n\n```\ntext/vnd.twbase;flexibility=htmlp\n```\nwhere:\n\nvnd.twbase refers to the tiddlywiki5 parser stripped of its rules. \n\nhtmlp is a json tiddler that contains options to define which rules will make up the new type.\n\nIn this example htmlp could contain\n\n```\n{\n  "parserrules": {\n    "pragmaRuleList": [],\n    "blockRuleList": [\n      "html"\n    ],\n    "inlineRuleList": [\n      "html",\n      "prettylink",\n      "transcludeinline",\n      "entity",\n      "wikilink"\n    ]\n  }\n}\n```\n"prettylink" etc are the tiddlywiki5 supplied \'parser rules\'.  Non-tiddlywiki defined rules may also be be used.\n\nSee working examples at the project home: http://bjtools.tiddlyspot.com\n',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/tiddlyclip",author:"Jeffrey Wilkinson (aka BJ)",name:"tiddlyclip",description:"include web content",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/tiddlyclip-plugin">{{$:/core/images/github}} <$text text="https://github.com/buggyj/tiddlyclip-plugin"/></$button><br/>',version:"0.0.8-alpha","plugin-type":"plugin","core-version":">=5.1.10","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/markdownlike",author:"JeffreyWilkinson",name:"markdownlike",description:"Markdown Like Wikitext Extension",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/Tw5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/Tw5-tools"/></$button><br/>\n----\n\n##Example Source\n```\n# Source of content made to be even more markdown like\nIn this content I have made the following changes to the rules\n\none level of markdow number lists now supported\n\n1. using **listmod rule** - now I am using a  . for ordered lists\n2. using **headingmod rule** I am using # inplace of ! for headings\n3. using **boldmode rule** I am using two * inplace of two \'\n\nI have also:\n\n+ **replaced** * with + for unordered lists\n```\n----\n\n##Example Rendered\n# Source of content made to be even more markdown like\nIn this content I have made the following changes to the rules\n\none level of markdow number lists now supported\n\n1. using **listmod rule** - now I am using a  . for ordered lists\n2. using **headingmod rule** I am using # inplace of ! for headings\n3. using **boldmode rule** I am using two * inplace of two \'\n##\nI have also:\n\n+ **replaced** * with + for unordered lists\n',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bj/storytabs",author:"Jeffrey Wilkinson aka BJ",name:"storytabs",description:"story tabs",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/buggyj/tw5-tools">{{$:/core/images/github}} <$text text="https://github.com/buggyj/tw5-tools"/></$button><br/>Facilitates easier navigating between open tiddlers. Links to open tiddlers appear above top of the story river . If \'story mode\' is set to zooming (see in appearance tab in the $:/ControlPanel tiddler) then the open tiddlers appear in tabs. The top links are controlled from the \'setting\' tab in the $:/ControlPanel tiddler.\n',version:"1.11.0","plugin-type":"plugin","core-version":">=5.1.11","requires-reload":!1,type:"application/json"},{title:"$:/plugins/tesseract/Action-JSONtid",author:"Riz",name:"Action-JSONtid",description:"Action-JSONtid: Create tiddlers from JSON tiddlers",version:"0.7.4","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/attributes",author:"Riz",name:"attributes",description:"Attributes: Add attributes to your button widgets",version:"0.6.7","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/dragSnippetTitle",author:"Riz",name:"dragSnippetTitle",description:"dragSnippetTitle: Add title to dragged snippets",version:"0.3.12","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/ExtendedInfo",author:"Riz",name:"ExtendedInfo",description:"Extended Info: Adding more info tiddlers to the store",version:"0.5.9","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/ImportResolution",author:"Riz",name:"ImportResolution",description:"ImportResolution: Auto enumerates the imported tiddlers if there is a conflict",version:"0.5.3","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/reveal-Ext",author:"Riz",name:"reveal-Ext",description:"Reveal-Extended: Adding <,>,<=,>= types to reveal widget",version:"0.6.6","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/forloop",author:"Riz",name:"forloop",description:"Simple forloop: To iterate a varible till maximum value",version:"0.4.2","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/sortan",author:"Riz",name:"sortan",description:"Sortan: Filter for sorting alphanumerically",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://ibnishak.github.io/Tesseract/">{{$:/core/images/github}} <$text text="https://ibnishak.github.io/Tesseract/"/></$button><br/>',version:"0.6.4","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/swal",author:"Riz",name:"swal",description:"Sweet Alerts",readme:"Plugin wrapper for Sweet Alerts library\n\n",version:"5.1.16-prerelease","plugin-type":"plugin","core-version":">=5.0.0","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/uncheckactions",author:"Riz",name:"UncheckActions",description:"UncheckActions: Adding Uncheck actions to checkbox widget",version:"0.6.3","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/tesseract/uuid",author:"Riz",name:"uuid",description:"UUID: Creating Unique Identifiers",version:"1.0.2","plugin-type":"plugin","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bimlas/kin-filter",author:"bimlas",name:"Kin filter",description:"Recursively looking for kinship between tiddler titles",readme:"<$button class=\"tc-btn-invisible\" message=\"tm-open-external-window\" param=\"https://gitlab.com/bimlas/tw5-kin-filter\">{{$:/core/images/github}} <$text text=\"https://gitlab.com/bimlas/tw5-kin-filter\"/></$button><br/>The purpose of the ''kin'' operator with examples:\n\n* Finds related tags, related tiddlers in any depth\n* Finds out where base tiddler originates and what other elements originate from it\n* Finds the ancestors and successors of a family member\n* Finds the \"leaves\" of the branch of the base tiddler in a tree-like structure (where the base tiddler is a leaf)\n* Finds the super- and subsets / groups of a mathematical set (where the base tiddler is a set)\n\n[img[kin-filter-concept.svg]]\n\n|''input''|a [[selection of titles|https://tiddlywiki.com/#Title%20Selection]]|\n|''suffix''|the ''kin'' operator uses a rich suffix, see below for details|\n|''parameter''|''B'' base tiddler title or nothing|\n|''output''|''with parameter B''<br>&raquo; those input titles which are ''kin with B'' <br>''without B''<br>&raquo; ''all'' tiddler titles which are ''kin with input titles'' (treat input titles as base tiddlers)|\n|''`!` output''|''with parameter B''<br>&raquo; those input titles which are ''//NOT// kin with B''<br>''without parameter B''<br>&raquo; ignored|\n\nThe ''kin'' operator uses an extended syntax that permits multiple fields and flags to be passed:\n\n```\n[kin:<field>:<direction>:<depth>[<operand>]]\n```\n\n* ''field'': name of the [[field|https://tiddlywiki.com/#TiddlerFields]] which connecting tiddlers (assumed to be a [[title list|https://tiddlywiki.com/#Title%20List]], defaulting to `tags`)\n* ''direction'':  collect the tiddler titles in this direction relative to the base tiddler\n** ''from'': collect kins of base tiddler pointing from it (including the base tiddler title itself)\n** ''to'': collect kins of base tiddler pointing to it (including the base tiddler title itself)\n** ''with'': (the default) union of the aboves\n* ''depth'': maximum depth of the collected labels in the tree structure relative to the base tiddler (a positive number, not limited by default)\n* ''operand'': filter operand, the base tiddler\n\n''kin'' is a [[modifier|https://tiddlywiki.com/#Selection%20Constructors]], but without ''B'' parameter is a [[constructor|https://tiddlywiki.com/#Selection%20Constructors]].",version:"1.0.0","plugin-type":"plugin","core-version":">=5.1.18","requires-reload":!0,type:"application/json"},{title:"$:/plugins/bimlas/locator",author:"bimlas",name:"locator",description:"Discover and search by context",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://gitlab.com/bimlas/tw5-locator">{{$:/core/images/github}} <$text text="https://gitlab.com/bimlas/tw5-locator"/></$button><br/>! What is the Locator exactly?\n\nBefore I explain, let\'s clarify a few things about TiddlyWiki:\n\n* Tiddlers can contain any data (notes, tasks, phone numbers, photos, music videos, recipes, products, family members, ...)\n* Tiddlers can have tags\n* Tags can be used to "label" tiddlers to categorize them (just like hashtags)\n* Tags can be used to create hierarchies, trees (table of contents) by adding the parent tiddler as a tag to the current tiddler\n* Tiddlers can have fields\n* Fields can contain arbitrary data (date, numeric value, text, even a list of other tiddlers) which characterize the tiddler\n* Tags are stored in `tags` field of tiddler\n* Because `tags` is no different from the other fields, \'\'any field can be used as tags\'\'\n* The links in the text also form a tree\n\nLocator provides a universal interface for navigating between your tiddlers and searching, filtering them without the need to write [[filter expressions|https://tiddlywiki.com/#Filters]]. The plugin contains \'\'a table of contents macro\'\' and an enhanced search engine that contains a \'\'visual filter builder to filter results by tags and field values\'\'. You can organize the tiddlers to any number of trees, even by custom fields or links in text. Unlike [[classic Table of Contents|https://tiddlywiki.com/#Table-of-Contents%20Macros%20(Examples)]], [[standard search|$:/core/ui/AdvancedSearch/Standard]], [[filter search|$:/core/ui/AdvancedSearch/Filter]] and [[list of tags|$:/core/ui/MoreSideBar/Tags]], this plugin handles these functions organically.\n\n\'\'If you have used the previous version, be sure to check [[changelog|$:/plugins/bimlas/locator/README/CHANGELOG]] for incompatible changes.\'\'\n\n!! Read the [[tutorial|Tutorial]] to learn how to use the plugin\n\nIntroducing some features\n\n<iframe width="1280" height="720" src="https://www.youtube.com/embed/vqSKjafeZyE" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>',version:"2.0.1","plugin-type":"plugin","core-version":">=5.1.18","requires-reload":!0,type:"application/json"},{title:"$:/plugins/dullroar/sitemap",author:"Jim Lehmer",name:"sitemap",description:"TiddlyWiki5 plugin to generate sitemap.xml.",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/dullroar/TW5-sitemap">{{$:/core/images/github}} <$text text="https://github.com/dullroar/TW5-sitemap"/></$button><br/>iddlyWiki5 plugin to generate sitemap.xml (http://www.sitemaps.org/protocol.html).\n\nIt works in the browser but its primary use case is for generating a sitemap.xml for static sites\nusing something similar to the following when running TiddlyWiki under node.js:\n\n```\ntiddlywiki --rendertiddlers [!is[system]] statictiddler.html static text/plain  --rendertiddler sitemap sitemap.xml text/plain\n```\n\nThe rest of this document presumes familiarity with TiddlyWiki5 (TW) and node.js (node).',version:"0.0.2","plugin-type":"plugin","core-version":">=5.0.8","requires-reload":!0,type:"application/json"},{title:"$:/plugins/felixhayashi/hotzone",author:"Felix Küppers",name:"hotzone",description:"Be notified when tiddlers are scrolled into view",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/felixhayashi/TW5-HotZone">{{$:/core/images/github}} <$text text="https://github.com/felixhayashi/TW5-HotZone"/></$button><br/>The HotZone plugin gives you Information about the tiddler currently in focus.\n\nEverytime a tiddler\'s body reaches a defined threshold, the value of `$:/temp/focussedTiddler` is updated with the title of the currently focussed tiddler. Moreover, a css class (`hzone-focus`) is added to the tiddler frame to allow css styling.\n\n!! Inspiration\n\nYou could write a small widget that listens to the changes of `$:/temp/focussedTiddler` to \n\n* Unfold the table of contents or highlight the current topic.\n* Change the page title\n* Update the permalink in the address bar\n* Log the user behavior\n* Highlight the focussed tiddler\n\nTiddlyMap uses the HotZone plugin to update its live view in the sidebar. Now that\'s cool or not?',version:"0.0.3","plugin-type":"plugin","core-version":">=5.1.5","requires-reload":!0,type:"application/json"},{title:"$:/plugins/felixhayashi/respawn",author:"Felix Küppers",name:"Respawn",description:"Open default tiddlers when river is empty",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/felixhayashi/TW5-respawn">{{$:/core/images/github}} <$text text="https://github.com/felixhayashi/TW5-respawn"/></$button><br/>This plugin will prevent an empty story-river experience by respawning all default (home) tiddlers once the river is empty, i.e. all tiddlers have been closed.\n\nThis plugin makes most sense if the wiki is used as website to avoid that the user is confronted with an empty page.',version:"0.0.3","plugin-type":"plugin","core-version":">=5.1.5","requires-reload":!0,type:"application/json"},{title:"$:/plugins/felixhayashi/tiddlymap",author:"Felix Küppers",name:"TiddlyMap",description:"Map drawing and topic visualization for your wiki",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/felixhayashi/TW5-TiddlyMap">{{$:/core/images/github}} <$text text="https://github.com/felixhayashi/TW5-TiddlyMap"/></$button><br/>! TW5-Vis.js\n\nA tiddlywiki plugin for the vis.js library.\n\n---\n\n! Notes on Copyright\n\n!! TiddlyWiki\n\nCreated by Jeremy Ruston, (jeremy [at] jermolene [dot] com)\n\nCopyright © Jeremy Ruston 2004-2007 Copyright © UnaMesa Association 2007-2014\n\nPublished under the following [licenses](https://github.com/Jermolene/TiddlyWiki5/tree/master/licenses):\n\n1. BSD 3-clause "New" or "Revised" License (including any right to adopt any future version of a license if permitted)\n2. Creative Commons Attribution 3.0 (including any right to adopt any future version of a license if permitted)\n\n!! The **vis.js** library\n\nCopyright (c) 2014 [Almende B.V.](https://github.com/almende/vis)\n\nPublished under the following licenses:\n\n1. Apache License Version 2.0, January 2004 http://www.apache.org/licenses/\n2. MIT License (MIT)\n',version:"0.17.8+10010","plugin-type":"plugin",dependents:"$:/plugins/felixhayashi/vis","core-version":">=5.1.5","requires-reload":!0,type:"application/json"},{title:"$:/plugins/felixhayashi/vis",author:"Felix Küppers",name:"Visjs",description:"TiddlyWiki5 plugin for the vis.js library",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/felixhayashi/TW5-Vis.js">{{$:/core/images/github}} <$text text="https://github.com/felixhayashi/TW5-Vis.js"/></$button><br/>! TW5-Vis.js\n\nA tiddlywiki plugin for the vis.js library.\n\n---\n\n! Notes on Copyright\n\n!! TiddlyWiki\n\nCreated by Jeremy Ruston, (jeremy [at] jermolene [dot] com)\n\nCopyright © Jeremy Ruston 2004-2007 Copyright © UnaMesa Association 2007-2014\n\nPublished under the following [licenses](https://github.com/Jermolene/TiddlyWiki5/tree/master/licenses):\n\n1. BSD 3-clause "New" or "Revised" License (including any right to adopt any future version of a license if permitted)\n2. Creative Commons Attribution 3.0 (including any right to adopt any future version of a license if permitted)\n\n!! The **vis.js** library\n\nCopyright (c) 2014 [Almende B.V.](https://github.com/almende/vis)\n\nPublished under the following licenses:\n\n1. Apache License Version 2.0, January 2004 http://www.apache.org/licenses/\n2. MIT License (MIT)\n',version:"5.2.1","plugin-type":"plugin","core-version":">=5.0.0","requires-reload":!0,type:"application/json"},{title:"$:/plugins/gt6796c/mermaid-tw5",author:"gt6796c",name:"mermaid-tw5",description:"Mermaid lets you create diagrams and visualizations using text and code.",readme:"This is a TiddlyWiki plugin for using [[mermaid.js|https://mermaid-js.github.io/mermaid/#/]].\n\nIt is completely self-contained, and doesn't need an Internet connection in order to work. It works both in the browser and under Node.js.\n\nIt is currently based on [[mermaid.js 8.13.2|http://mermaid-js.github.io/mermaid]]\n\n!! Installation\nYou can drag the plugin link into your TiddlyWiki to install, from http://efurlanm.github.io/mermaid-tw5\n\n!! Dependencies\n;This plugin requires:\n*[[rocklib Plugin|https://gt6796c.github.io]]\n(will be auto installed by CPL)",version:"0.3.3","plugin-type":"plugin",icon:"https://mermaid-js.github.io/mermaid/img/header.png",dependents:"gt6796c/rocklib","requires-reload":!0,type:"application/json"},{title:"$:/plugins/gt6796c/rocklib",author:"gt6796c",name:"rocklib",description:"This plugin packages rocklib for use by other plugins (mermaid-tw5) . It does not provide any end-user visible features.",readme:"This plugin packages [[rocklib|https://github.com/gt6796c/rocklib]] for use by other plugins. It does not provide any end-user visible features.\n\nNo user-visible elements.\n\nprovides the following functions:\n\n;getScriptBody(src, att)\n: attempts to pull the text out of ``src`` element's body or the specified attribute ``att``\n\n;getOptions(src,tag,options)\n: in the case of a widget, adds all of ``src`` element's attributes into the ``options`` object\n: in the case of a Tiddler, adds all of the fields that begin with ``tag`` into the ``options`` object (minus the ``tag-`` prefix)\n: All options are first treated as Data Tiddler Names, then JSON, and finally as plain text\n\n;getCanvas(src,tag,type)\n: creates a uniquely-named \"canvas\" which may be of type ``type``. Supported types are ``div`` and ``canvas``\n: The height and width attributes from the ``src`` element will be applied to the canvas\n\n;nextColor(s,v)\n: returns a random-ish color string from the same palette as specified byt the ``s`` saturation and ``h`` hue.\n: The color is in the form of ``#rrggbb``\n\n;rgb_to_hsv(r,g,b)\n: returns array of [hue, saturation, value]\n: r can be array of [r,g,b] or individual parameters can be used\n\n;hsv_to_rgb(h,s,v)\n: returns array of [red, green, blue]\n: h can be array of [h,s,v] or individual parameters can be used",version:"0.1.6","plugin-type":"plugin","core-version":">=5.0.0","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/commandpalette",author:"LinOnetwo",name:"Command Palette",description:"Command palette Chinese translated",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/tiddly-gittly/tiddlywiki-plugins">{{$:/core/images/github}} <$text text="https://github.com/tiddly-gittly/tiddlywiki-plugins"/></$button><br/>此插件基于[[Souk21/TW-commandpalette|https://github.com/Souk21/TW-commandpalette]]，非常感谢他的工作，在过去的一年里这个插件极大地为我提高了工作效率。我将它主要源码复制过来汉化并加入拼音搜索功能，以便我们更灵活地在中文环境下使用。\n\n!! 功能\n\n按下 ctrl/cmd + P 唤起搜索框，按的时候如果多加一个 shift 可以唤起功能框。\n\n搜索的时候可以打拼音。\n',version:"0.2.3","plugin-type":"plugin",dependents:"$:/plugins/linonetwo/pinyin-fuzzy-search","core-version":">=5.2.0","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/copy-on-select",author:"LinOnetwo",name:"copy-on-select",description:"Copy what you are selecting inside the wiki into the clipboard",readme:"!! 动机\n\n我已经习惯了用方便的[[Copy On Select|https://addons.mozilla.org/en-US/firefox/addon/copy-on-select]] Firefox 插件，现在到了 TiddlyWiki 里我经常还是以为选中了就复制了，然后黏贴到别的地方才发现其实并没有复制，很不习惯。\n\n所以我自己重新写了一个适配 TiddlyWiki 的选中即复制脚本。\n\n!! 用法\n\n选中编辑器、按钮等区域以外的任何文本都会直接复制。\n\n这个插件里的条件语句让它在编辑器等特殊区域内不会起作用，以免干扰「全选黏贴覆盖原有内容」等操作。\n",version:"0.0.1","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!1,type:"application/json"},{title:"$:/plugins/linonetwo/github-external-image",author:"LinOnetwo",name:"github-external-image",description:"Use github as your image storage, add _canonical_uri to all image, pointing to raw.github",readme:'!! Usage\n\nPlease fill in [[$:/GitHub/Repo]] and [[$:/config/linonetwo/github-external-image/tiddler-folder-name]] to get started.\n\nThen, on build, all images will be replaced by place holders.\n\nPlease use following build target:\n\n```json\n"externalimages": [\n  "--setfield",\n  "[is[binary]] [type[application/msword]]",\n  "_canonical_uri",\n  "$:/core/templates/canonical-uri-external-image",\n  "text/plain",\n  "--setfield",\n  "[is[binary]] [type[application/msword]]",\n  "text",\n  "$:/core/templates/canonical-uri-external-image",\n  "text/plain",\n  "--rendertiddler",\n  "$:/core/save/all",\n  "index.html",\n  "text/plain"\n],\n```\n',version:"0.0.1","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!1,type:"application/json"},{title:"$:/plugins/linonetwo/inverse-link-and-folder",author:"LinOnetwo",name:"inverse-link-and-folder",description:"Add inverse link (bi-directional link) and folder information to the bottom of tiddlers",readme:"\n!! Features\n\nThis plugin provides these additional info on the bottom of every tiddler:\n\n# other tiddler linking to this tiddler\n# tiddlers in this folder (tagged with this tiddler's title, see tw-locator's document for detail about the tag-based folder structure)\n# folders containing this tiddler (since tag-based folder structure is a Graph, so there may be many)\n\nYou can change [[infobar.tid|$:/plugins/linonetwo/inverse-link-and-folder/infobar]] to add more info.\n\n[[list-link.tid|$:/plugins/linonetwo/inverse-link-and-folder/list-link]] and [[list-link.css|$:/plugins/linonetwo/inverse-link-and-folder/list-link.css]] are styles of that info bar.\n\n!! Credits\n\nThis plugin is inspired by RoamResearch. list-link macro and filter in infobar is learnt from  copy&paste-ing of Jeremy's code and tutorials.\n",version:"0.0.4","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!1,type:"application/json"},{title:"$:/plugins/linonetwo/itonnote",author:"LinOnetwo",name:"ItonNote",description:"Heavy lifting for new users to set up a powerful and opinionated knowledge management system.",readme:"!! 功能\n\n预配置了一系列琐碎的内容，一般来自各插件的Readme和论坛讨论，但大多数人懒得看Readme，故在此直接帮忙配置好了。\n\n具体预置内容介绍可见[[Description|$:/plugins/linonetwo/itonnote/description]]。\n\n{{$:/plugins/linonetwo/itonnote/ControlPanel}}\n",version:"0.3.7","plugin-type":"plugin",dependents:"$:/plugins/bimlas/locator","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/open-in-external-app",author:"LinOnetwo",name:"Open in External App",description:"(Requires TidGi) A toolbar button to open PDF tiddler in os default reader.",readme:"After you import a PDF or image file into your wiki, you can open that tiddler, and click on the button to open that file in external PDF viewer or image reader.\n\nNote that if you use this to open a `.tid` or `.md` file, and edit it, things won't change in the wiki, because the tiddlywiki currently doesn't reload changed files from the disk.",version:"0.0.2","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/opened-tiddlers-bar",author:"LinOnetwo",name:"Opened Tiddlers Bar",description:"VSCode style opened files top bar",readme:'!! Features\n\nThis plugin provides VSCode style "Opened Tiddlers" top bar\n\n!! Credits\n\nThis plugin is based on $:/plugins/bj/storytabs , which is in MIT license, thank you, Buggyj!\n',version:"0.1.0","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!1,type:"application/json"},{title:"$:/plugins/linonetwo/pinyin-fuzzy-search",author:"LinOnetwo",name:"pinyin-fuzzy-search",description:"提供模糊搜索和拼音搜索的能力",version:"0.1.2","plugin-type":"plugin","core-version":">=5.2.0","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/prevent-edit",author:"LinOnetwo",name:"Prevent Edit",description:'Prevent "This page is asking you to confirm that you want to leave" in a read-only site',readme:"!! 功能\n\n这个插件主要是让在线部署后的 Wiki 不会弹出「有变动关闭网页前请保存」这样的对话框。\n\n!! 动机\n\n来自 TiddlyMap 的 [[$:/plugins/felixhayashi/tiddlymap/misc/defaultViewHolder]] 和来自系统的 [[$:/StoryList]] 老是自动变：\n\n```diff\ncreated: 20200409022623558\ncreator: Lin Onetwo - 林一二\n-modified: 20200414104033109\n+modified: 20200414135126182\nmodifier: Lin Onetwo - 林一二\ntitle: $:/plugins/felixhayashi/tiddlymap/misc/defaultViewHolder\ntype: text/vnd.tiddlywiki\n```\n\n没有实质性的变化，而且又经常发生在 wiki 部署后，这样在线版 wiki 就会弹出「This page is asking you to confirm that you want to leave - data you have entered may not be saved」。\n\n但我只是想做浏览不想做编辑啊，这让我觉得很烦。\n\n后来发现原来是 onbeforeunload 导致的，[[我去仓库里搜到了|https://github.com/Jermolene/TiddlyWiki5/search?q=beforeunload&unscoped_q=beforeunload]]是 `$tw.utils.each($tw.unloadTasks` 在用它，所以我就过滤了一下 `$tw.unloadTasks`。而且还不能立即做这个过滤，因为 `$:/tags/RawMarkup` 是在沙盒里执行的，不能修改 `$tw` 。\n\n所以最终我跟着 [[Adding Babel Polyfill to TiddlyWiki|https://tiddlywiki.com/dev/#Adding%20Babel%20Polyfill%20to%20TiddlyWiki]] 这篇教程，加了一个 startup script，在启动时、上述代码之后，就清理掉那个导致弹窗的 unloadTask，世界终于清静了。\n\n最终，我把它包装成了这个 [[prevent-edit|$:/plugins/linonetwo/prevent-edit]] 插件。\n",version:"0.0.1","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/preview-glass",author:"LinOnetwo",name:"preview-glass",description:"Glassify Modification to the tobibeer/preview plugin, add inverse links, and make it auto-close",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/tobibeer/tw5-preview">{{$:/core/images/github}} <$text text="https://github.com/tobibeer/tw5-preview"/></$button><br/>!! About\n\nModification to the [[tobibeer/preview plugin|https://tobibeer.github.io/tw5-plugins/#preview]], make it auto close if mouse move out of the link (as discussed in the [[issue#1|https://github.com/tobibeer/tw5-preview/issues/1]]), and add custom style, make it like a glass.\n\n!! Prerequisit\n\nThis plugin has three dependencies:\n\n# [[tobibeer/appear|http://tobibeer.github.io/tw5-plugins/#appear]] to make popup work\n# [[$:/plugins/ooktech/dynamic-tables]] to make fields table in the popup template\n# [[$:/plugins/linonetwo/inverse-link-and-folder]] to make bi-directional links in the popup template\n\n!! This Plugin is a Forked version\n\nOriginal source is located in [[https://github.com/tobibeer/tw5-preview]], which has version 0.5.6 at several years ago, so maybe this plugin can be 0.5.7?\n\nSee [[document of tobibeer/preview|https://tobibeer.github.io/tw5-plugins/#preview]] to get more usage and explaination.\n\nThis plugin provides some new template, which depends on some other plugin to work, see plugin.info for detail.\n\n- [[$:/plugins/linonetwo/preview-glass/preview-template.css]] new styles\n- [[$:/plugins/linonetwo/preview-glass/template]] new template\n\nAnd some overrides:\n\n- [[$:/plugins/tobibeer/preview/link.js]] is override by this plugin, by providing a new js with same title\n- [[$:/plugins/tobibeer/preview/defaults/not]] set some link to not have pop up.\n- [[$:/plugins/tobibeer/preview/defaults/class]] and [[$:/plugins/tobibeer/preview/defaults/template]] override the template and style settings\n- [[$:/plugins/tobibeer/preview/defaults/delay]] change the popup delay\n',version:"0.5.7","plugin-type":"plugin",dependents:"$:/plugins/tobibeer/appear $:/plugins/ooktech/dynamic-tables $:/plugins/linonetwo/inverse-link-and-folder","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/service-worker",author:"LinOnetwo",name:"service-worker",description:"Use service worker to cache content, make it works even offline, and can be add to the desktop as an App.",readme:'!! Usage\n\nAfter install, you have to publish your wiki as a HTTPS website to make it work.\n\n!!! Make sure to include all necessary step in the build process\n\nAdd following files to your `/public` folder after build, you can use a script to copy them to the build folder after the wiki build process:\n\n1. Add a `manifest.webmanifest` like:\n\n```json\n{\n  "background_color": "white",\n  "theme_color": "white",\n  "description": "Meme of LinOnetwo 林一二的模因和想法 - TiddlyWiki 非线性的知识库和博客",\n  "display": "standalone",\n  "icons": [\n    {\n      "src": "/TiddlyWikiIconBlack.png",\n      "sizes": "256x256",\n      "type": "image/png"\n    },\n    {\n      "src": "/TiddlyWikiIconWhite.png",\n      "sizes": "144x144",\n      "type": "image/png"\n    }\n  ],\n  "name": "TiddlyWiki",\n  "short_name": "Wiki",\n  "lang": "zh-CN",\n  "start_url": "/",\n  "scope": "/"\n}\n```\n\nMake sure icon size is at least 144x144. And change all necessary fields.\n\n2. Add `service-worker.js`:\n\nSee [[https://github.com/linonetwo/Meme-of-LinOnetwo/public/service-worker.js|https://github.com/linonetwo/Meme-of-LinOnetwo/blob/d088f72a2b95ee21b68af1b349d9993a3997bf19/Meme-of-LinOnetwo/public/service-worker.js]] for example.\n\n!!! Config router\n\nSometimes request from this plugin to your `service-worker.js` will resulted in 404, this is basically because you are not putting `service-worker.js` just besides your `index.html`, or the router config is wrong.\n',version:"0.0.1","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!1,type:"application/json"},{title:"$:/plugins/linonetwo/smart-field",author:"LinOnetwo",name:"Smart Field 智能表单",description:"Generate a Field editing Form, based on Tag and Ontology on your tiddler.",readme:"!! Background\n\nI hope there can be a standard way to encourage plugin developers to use similar field name in their plugins, so different plugins can be used together on a same set of data. See [[Suggestion for all Plugin developers about field name: Let’s use Ontology to maintain Interoperability|https://talk.tiddlywiki.org/t/suggestion-for-all-plugin-developers-about-field-name-lets-use-ontology-to-maintain-interoperability/1923]] for the discussion.\n\n!! Example\n\nOpen [[$:/plugins/linonetwo/smart-field/Example]] to see the form provided by the [[example FormTag|$:/plugins/linonetwo/smart-field/ExampleFormTag]] and the example [[Ontology|$:/plugins/ontology/sfeo]].\n\n!! Basic Usage\n\n!!! Display form in your tiddler\n\nJust add some [[FormTag|$:/plugins/linonetwo/smart-field/FormTag]] to your wiki. You can try adding `$:/plugins/linonetwo/smart-field/ExampleFormTag` to try out!\n\n!!! Add new form fields\n\nRead [[FormTag|$:/plugins/linonetwo/smart-field/FormTag]] document to learn about how to create your own tag that will add form to tiddler when added to a tiddler.\n\nIf you are going to create an ontology tag that can add field form to user's tiddler, you can read [[$:/plugins/linonetwo/smart-field/ontologyDeveloper]].\n\n!! Plugin Developer\n\nSee [[$:/plugins/linonetwo/smart-field/pluginMaintainer]] for how this plugin works.\n",version:"0.1.4","plugin-type":"plugin",dependents:"$:/plugins/linonetwo/tw-react","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/source-control-management",author:"LinOnetwo",name:"SCM",description:"Use TiddlyGit's NodeJS API to sync data to git on the cloud",readme:"!! 功能\n\n[[WebCatalog|https://webcatalogapp.com/]] 除了[[能将 TiddlyWiki 包装成桌面应用|https://onetwo.ren/%E7%94%A8tiddlywiki%E6%9B%BF%E4%BB%A3notion%E5%92%8Cevernote%E7%AE%A1%E7%90%86%E7%9F%A5%E8%AF%86/]]以外，还提供了自定义 API 并暴露给网页的功能，让我们可以在 Wiki 网页里使用一些高级功能。\n\n本插件利用暴露的自定义 API 实现：\n\n# 查看本地 NodeJS 版 TiddlyWiki 是否完全与 Github 备份云同步了\n# 一键同步本地和云端\n\n!! 用法\n\n当点开 SCM 标签页的时候，会进行一次 git 环境检查，因为使用的 git 库 dugite 比较卡，所以只进行一次检查，如果需要刷新，需要来回切换一下 tab。\n",version:"0.1.3","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/sub-wiki",author:"LinOnetwo",name:"sub-wiki",description:"Allow you make some tiddlers private, and store them in a private repo.",readme:"!! Usage\n\nEdit [[`tiddlers/FileSystemPaths.tid`|FileSystemPaths.tid]] using VSCode or automatically updated by TiddlyGitDesktop (instead of edit it from the TiddlyWiki) to be something like:\n\n```tid\n[!is[system]kin::to[APrivateContent]addprefix[subwiki/private-wiki/]]\n[!is[system]kin::to[Photos]addprefix[subwiki/private-wiki-photos/]]\n```\n",version:"0.0.1","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!1,type:"application/json"},{title:"$:/plugins/linonetwo/template-list",author:"LinOnetwo",name:"Template List",description:"Show a list of template when you create a new tiddler, and apply a template with a click.",readme:"!! Features\n\nThis plugin provides [[FeiShu Doc|https://www.feishu.cn/hc/zh-CN/articles/222318959624]] style template list for newly created tiddler.\n\n!! Add new template\n\n`$:/tags/TextEditor/Template` is the tag for the templates. Add it to a tiddler, and that tiddler will show up in the template list.\n\n!! Apply the template\n\nAfter you create an empty tiddler, that have an empty text field. You will notice that a template and a search bar show up in the bottom of the tiddler.\n\nClick on a template will apply the text field to the currentTiddler.\n\nYou can scroll to reveal more template if you have more than two rows of templates.\n",version:"0.1.2","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!1,type:"application/json"},{title:"$:/plugins/linonetwo/tw-react",author:"LinOnetwo",name:"ReactJS",description:"Allow using ReactJS Components in TW widget.",readme:"!! Example\n\n```tid\n<$likeButtonExampleWidget stateTiddler=\"$:/state/tw-react/readme/like-button\" />\n```\n\n<$likeButtonExampleWidget stateTiddler=\"$:/state/tw-react/readme/like-button\" />\n\nIt keeps its state via a state tiddler, and title of state tiddler is pass-in using `getProps = () => ({ stateTiddler: this.getAttribute('stateTiddler') });`, so `stateTiddler` attribute is passed from widget parameter to the React props.\n\nSee [[$:/plugins/linonetwo/tw-react/example.ts]] for example.\n\n!! Usage\n\n!!! Require and externalize 'react', 'react-dom'\n\nPlease make sure to externalize them, for example in the [[RollUp|https://rollupjs.org/]]:\n\n```json\n{\n  external: ['react', 'react-dom']\n}\n```\n\nOtherwise you will get [[You might have more than one copy of React in the same app|https://reactjs.org/docs/error-decoder.html/?invariant=321]] error.\n\nAnd use the subclass of Widget provided by this plugin:\n\n```\nconst Widget = require('$:/plugins/linonetwo/tw-react/widget.js').widget\n```\n\n!!! Using Typescript\n\n# use [[TW5-Typed|https://github.com/tiddly-gittly/TW5-Typed]] for basic tw types, see its readme for install instruction\n# install `tw-react` package via `npm i tw-react`, and import the type by `import type { ReactWidget } from 'tw-react';`\n\nUse the type:\n\n```js\nimport type { ReactWidget } from 'tw-react';\n\nconst Widget = require('$:/plugins/linonetwo/tw-react/widget.js').widget as typeof ReactWidget;\n\nclass YourWidget extends Widget {\n  reactComponent = SomeReactComponent;\n  getProps = () => {\n    return {\n      stateTiddler: this.getAttribute('stateTiddler'),\n      // ... other props for your react component\n    };\n  };\n}\n```\n\n!!! Props\n\nAnything returned from `getProps` method will pass to react component, passing `stateTiddler` is a good idea, but is not mandatory.\n\nFor example, this is what I returned in my `linonetwo/smart-form` plugin:\n\n```js\ngetProps = () => {\n    const currentTiddler = this.getAttribute('tiddler', this.getVariable('currentTiddler'));\n    // with lots of filter running and data transforms...\n    return {\n      schema,\n      formData,\n      children: null,\n      onChange,\n    };\n  };\n```\n",version:"0.1.2","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/linonetwo/zx-script",author:"LinOnetwo",name:"ZX Script Executor",description:"ZX is a tool for writing better scripts, this plugin allows you to execute a tiddler with zx.",readme:"!! Background\n\n[[google/zx|https://github.com/google/zx]] is a tool for writing better scripts, with Javascript.\n\nThis tiddlywiki plugin enables you to run any tiddler with zx.\n\n!! Usage\n\n!!! Tiddler Type\n\nTiddler with title extension `*.js *.md *.mjs` can be execute without problem. Other tiddler witout extension (no `.xxx`) will be executed as `*.md` file, for example, tid file without extions will be executed as `*.md`, but it works without problem too, even you are writing wiki text instead of markdown.\n\nIf you add filetype `application/javascript` to your tiddler, it will be recognized as `*.mjs`.\n\n!!! Prerequisit\n\nThis plugin requires [TiddlyGit](https://github.com/tiddly-gittly/TiddlyGit-Desktop) environment to function properly. It will send tiddler content to the `zx` inside TiddlyGit, and prints the output.\n\n!!! Button\n\nA ViewToolbar button is added. You can click on it to execute the script inside your tiddler.\n\nAnd the zx output will be printed below your tiddler content.\n\n!! Developer Documentation\n\nSee [[$:/plugins/linonetwo/zx-script/developer]]\n",version:"0.1.3","plugin-type":"plugin",dependents:"$:/plugins/linonetwo/itonnote","core-version":">=5.1.22","requires-reload":!0,type:"application/json"},{title:"$:/plugins/mat/field-value-selector",author:"Mat von TWaddle",name:"field-value-selector",description:"Shows a dropdown listing existing field values for that field name.",readme:"''field-value-selector'' is an EditView template that adds a small arrow button below the \"new fields\" area.\n\nWhen you fill in a custom field name and then click this button, you get a dropdown showing all existing field values for that field name.\n\nlist-before and list-after are special and instead showing lists of all viewtemplate titles and edittemplate titles for easy selection. This functionality was the main incentive for this 'plugin', because it is darn impossible to remember the template titles.\n\nInstalling this 'plugin' does not modify any shadow tiddlers (...which meant showing the button below the \"new fields\" area, instead of at a more prettily integrated position.) ",version:"0.0.1","plugin-type":"plugin","core-version":">=5.1.22","requires-reload":!1,type:"application/json"},{title:"$:/plugins/oflg/fishing-analysis",author:"oflg",name:"Fishing Analysis",description:"Analysis for Fishing.",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/oflg/fishing-analysis">{{$:/core/images/github}} <$text text="https://github.com/oflg/fishing-analysis"/></$button><br/><$list filter="[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]" variable="lang"><$list filter="[<lang>search[zh]]">[[钓鱼|https://oflg.github.io/fishing-manual/]]的图表子插件。图表可视化展示钓鱼数据。</$list><$list filter="[<lang>!search[zh]]">Analysis for [[Fishing|https://oflg.github.io/fishing-manual/]]. Graphical visualization of Fishing data.</$list></$list>',version:"0.2.4","plugin-type":"plugin",dependents:"$:/plugins/Gk0Wk/echarts $:/plugins/oflg/fishing","parent-plugin":"$:/plugins/oflg/fishing","core-version":">=5.2.1","requires-reload":!0,type:"application/json"},{title:"$:/plugins/oflg/fishing-catchfish",author:"oflg",name:"Fishing Catch Fish",description:"Catch Fish for Fishing.",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/oflg/fishing-catchfish">{{$:/core/images/github}} <$text text="https://github.com/oflg/fishing-catchfish"/></$button><br/><$list filter="[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]" variable="lang"><$list filter="[<lang>search[zh]]">[[钓鱼|https://oflg.github.io/fishing-manual/]]的渐进阅读子插件。用来渐进阅读已有或者导入的条目。可在阅读中摘录句子，也可注释单词并配合单词学习包来学习外语。</$list><$list filter="[<lang>!search[zh]]">Incremental Reading plugin for [[Fishing|https://oflg.github.io/fishing-manual/]]. Use to incrementally read existing or imported tiddlers.You can excerpt sentences as you read, or annotate words with the Learning Pack and learn foreign languages.</$list></$list>',version:"0.1.11","plugin-type":"plugin",dependents:"$:/plugins/oflg/fishing","parent-plugin":"$:/plugins/oflg/fishing","core-version":">=5.2.1","requires-reload":!1,type:"application/json"},{title:"$:/plugins/oflg/fishing-twpub",author:"oflg",name:"Fishing Import TWPUB",description:"Import TWPUB for Fishing.",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/oflg/fishing-twpub">{{$:/core/images/github}} <$text text="https://github.com/oflg/fishing-twpub"/></$button><br/><$list filter="[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]" variable="lang"><$list filter="[<lang>search[zh]]">[[钓鱼|https://oflg.github.io/fishing-manual/]]的导入 TWPUB 电子书子插件。导入 TWPUB 电子书进行渐进阅读。。</$list><$list filter="[<lang>!search[zh]]">Incremental Reading plugin for [[Fishing|https://oflg.github.io/fishing-manual/]]. Import TWPUB eBooks for incremental reading.</$list></$list>',version:"0.1.2","plugin-type":"plugin",dependents:"$:/plugins/oflg/fishing","parent-plugin":"$:/plugins/oflg/fishing","core-version":">=5.2.1","requires-reload":!1,type:"application/json"},{title:"$:/plugins/oflg/fishing",author:"oflg",name:"Fishing",description:"Incremental Learning program based on TiddlyWiki",readme:"<$button class=\"tc-btn-invisible\" message=\"tm-open-external-window\" param=\"https://github.com/oflg/fishing\">{{$:/core/images/github}} <$text text=\"https://github.com/oflg/fishing\"/></$button><br/><$list filter=\"[[$:/language]get[text]removeprefix[$:/languages/]else[en-GB]]\" variable=\"lang\">\n<$list filter=\"[<lang>search[zh]]\">\n\n钓鱼插件使用 [[FSRS 自由间隔重复调度|https://zhuanlan.zhihu.com/p/454932406]]算法，将[[渐进学习|https://www.yuque.com/supermemo/wiki/incremental_learning]]集成在 TiddlyWiki 中，终身知识，深入脑海。\n\n渐进学习主要使用''抽认卡''。抽认卡的背后有两个简单原理：[[间隔重复|https://supermemo.guru/wiki/Spaced_repetition]]和[[主动回忆|https://supermemo.guru/wiki/Active_recall]]。绝大多数人都经历过很多次“复习和考试”，但很少意识到其中运用了这两个原理。\n\n钓鱼插件把''笔记条目''作为抽认卡，进行渐进学习。既然在 TiddlyWiki 中 ''Tiddler''（笔记条目）的形象说法是故事河中的小鱼，那么就把将其勾入脑海中的插件叫做钓鱼。\n\n</$list>\n\n<$list filter=\"[<lang>!search[zh]]\">\n\nFishing plugin integrates [[Incremental Learning|https://help.supermemo.org/wiki/Incremental_learning]] into TiddlyWiki, using [[FSRS|https://github.com/open-spaced-repetition/free-spaced-repetition-scheduler]] algorithm, deepening lifelong knowledge into the Sea of Mind.\n\nIncremental learning mainly uses ''Flashcards''. There are two simple principles behind Flashcards: [[Spaced Repetition|https://supermemo.guru/wiki/Spaced_repetition]] and [[Active Recall|https://supermemo.guru/wiki/Active_recall]]. The vast majority of people have been through many 'reviews and exams', but rarely realize that these two principles are used.\n\nFishing plugin uses ''tiddler note'' as Flashcards for incremental learning. Since Tiddler means small fish in the Story River of TiddlyWiki, this plugin that hooks Tiddler into the Sea of Brain is called Fishing.\n\n</$list>\n</$list>",version:"2.1.1","plugin-type":"plugin","core-version":">=5.2.1","requires-reload":!0,type:"application/json"},{title:"$:/plugins/sobjornstad/TiddlyRemember",author:"Soren Bjornstad",name:"TiddlyRemember",description:"Embed Anki notes in your TiddlyWiki",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://github.com/sobjornstad/TiddlyRemember">{{$:/core/images/github}} <$text text="https://github.com/sobjornstad/TiddlyRemember"/></$button><br/>TiddlyRemember is a tool that integrates the [[TiddlyWiki|https://tiddlywiki.com]] non-linear note-taking system with the spaced-repetition-flashcards tool [[Anki|https://apps.ankiweb.net]].\nYou can interleave questions with your notes in TiddlyWiki,\n    then sync them into Anki notes with one click.\nYou can edit and move the questions around your TiddlyWiki,\n    and they will stay connected to the Anki notes.\nScheduling information in Anki is preserved when editing notes in TiddlyWiki.\n\nWhy would you want to keep your Anki notes in TiddlyWiki?\n\n* One of the problems with using spaced repetition to study complex topics is that individual cards can end up largely without context, and if you need a refresher, it\'s hard to find the original source. TiddlyRemember can take you right back to your notes.\n* If you already have notes on a topic, this can help keep your content more [[DRY|https://en.wikipedia.org/wiki/Don%27t_repeat_yourself]] -- you don\'t have to maintain the same knowledge in two places. If your knowledge on a topic changes and you update your notes or flashcards, they won\'t get out of sync.\n* You can easily add notes to your Anki collection at the same time you\'re taking narrative or outline notes, without having to switch back and forth between two applications.\n\nYou can write [[Question-and-answer notes]]:\n\n```\n<<rememberq "20200523175149066"\n\t"What tool does TiddlyRemember integrate TiddlyWiki with?"\n\t"Anki.">>\n```\n\nOr you can use [[Cloze notes]]:\n\n```\n<<remembercz "20200523175253647"\n\t"TiddlyRemember integrates TiddlyWiki with {Anki}.">>\n```\n\nReady to get started?\n\n```\n<<tabs\n    tabsList:"[tag<currentTiddler>]"\n    default:"Installing TiddlyRemember"\n\tstate:"$:/temp/TrTabState"\n    class:"tc-vertical"\n    template:"$:/sib/TabCurrentTemplate">>\n```',version:"1.3.3","plugin-type":"plugin","core-version":">=5.1.21","requires-reload":!1,type:"application/json"},{title:"$:/plugins/stobot/sticky",author:"stobot",name:"Stickies TODO",description:"A very lightweight way of flagging something for later. ☐ make this funnier later 😊",readme:"[[Sticky Todo|https://stobot.github.io/sticky]] is intended as a lightweight addition to your task management toolbox within TiddlyWiki. It's for things that on paper you might add a sticky-note to. Some of those things can be handled in a minute, some of those things might be added to your formal task list. Because of that, the priorities with this plugin are:\n\n# ''Quickness to add to'' - must minimize the interruption to note taking\n# ''Lightness of storage'' - no data to be stored outside the tiddler text area where notes are being taken\n\nMuch more documentation including a video walkthrough is available at [ext[https://stobot.github.io/sticky/]]\n\nFor questions or suggestions, I can be found as @stobot at [ext[https://talk.tiddlywiki.org/]] as well\n\nNote that I'm not an TiddlyWiki expert or software developer and offer no warranty, PLEASE BACKUP before / while using.\n",version:"0.1.30","plugin-type":"plugin","core-version":">=5.1.23","requires-reload":!1,type:"application/json"},{title:"$:/plugins/telmiger/EditorCounter",author:"Thomas & Jed",name:"EditorCounter",description:"EditorCounter & Autosaver",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://tid.li/tw5/plugins.html">{{$:/core/images/github}} <$text text="https://tid.li/tw5/plugins.html"/></$button><br/>!! Count Your Texts & Autosave\n\n{{$:/plugins/telmiger/EditorCounter/about}}\n\n!!! The counters\n* In edit mode users can see stats concerning the tiddler’s text and title fields. The numbers are updated whenever they pause typing.\n* Counters for //words// and/or //characters// can be activated in the plugin settings.\n* The colours of the counters change at some predefined numbers.\n** Settings for colors and color limits are not available in the plugin configuration. <br>Workaround: edit [[the template|$:/plugins/telmiger/EditorCounter/EditTemplate]].\n\n!!! Autosave\n* When activated in the [[plugin settings|$:/plugins/telmiger/EditorCounter/settings]], //autosave// will try to save the wiki in the background during editing: whenever a predefined number of characters has been added or removed, a save is triggered.\n** As an option you can show a checkbox in the editor to pause/activate automatic saving.\n\n!!! Parameters\n\n|!Parameter |!Description |\n|colors |Optionally, define an array of color and number pairs to set minimal color limits. |\n|colorState |Optional state tiddler to save the color value. |\n|field |Calculate for the text in this field. |\n|mode |Entity to calculate: //word// or //character// or //autosave//. Defaults to "character". |\n|savelimit |A number of character changes after which //autosave// is performed. Default value: 200 |\n|text |Calculate this text. |\n|tiddler |Optional title of a tiddler to take the field from. Defaults to current tiddler. |\n\n!!! Widget usage\nThis plugin is based on a similar [[solution by Jed Carty|$:/plugins/telmiger/EditorCounter/credits]] – many thanks! \n\nThe widget can be used in other contexts than the plugin. The usage would be very similar to [[Jed’s examples on ooktech.com|http://ooktech.com/jed/ExampleWikis/WordCount/#%24%3A%2Fplugins%2Finmysocks%2FWordCount%2FWord%20Count%20Widget]] \n\nKnown differences: instead of `<$word-count` start with `<$editor-counter`. Default mode is //character//.\n\n!!!! Widget examples\n\n```\n<$editor-counter tiddler=SomeTiddler field=some_field mode=word/>\n<$editor-counter tiddler=SomeTiddler mode=character colors="blue:10,green:50,red:100"/>\n<$editor-counter text="some text string" mode=character colorState="$:/state/someTextColor" colors="blue:10,green:50"/>\n<$editor-counter mode=autosave savelimit=300/>\n```',version:"0.6.6","plugin-type":"plugin","core-version":">=5.1.13","requires-reload":!0,type:"application/json"},{title:"$:/plugins/telmiger/HarveyBalls",author:"Thomas Elmiger",name:"HarveyBalls",description:"Harvey balls icon set",readme:'<$button class="tc-btn-invisible" message="tm-open-external-window" param="https://tid.li/tw5/plugins.html">{{$:/core/images/github}} <$text text="https://tid.li/tw5/plugins.html"/></$button><br/>\\define tr(variant,nr:"")\n<$vars tit="$:/language/HarveyBalls/$variant$/title" desc="$:/language/HarveyBalls/$variant$/desc" nr="""$nr$""">\n<tr><td>{{$:/plugins/telmiger/Harvey
