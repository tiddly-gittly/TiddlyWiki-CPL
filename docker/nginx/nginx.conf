# nginx reverse proxy for TiddlyWiki-CPL
# Provides: gzip compression, static asset caching, maintenance page fallback
#
# Architecture:
#   nginx (:80) → TiddlyWiki (:8080)
#   During startup: nginx → maintenance-server (:8081) via flag file check
#
# Maintenance mode:
#   The CPL entrypoint creates /tmp/cpl-maintenance-active while building.
#   nginx checks this file per-request and proxies to the maintenance server.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # ── Gzip compression ─────────────────────────────────────────────
    # The main reason to put nginx in front: the homepage HTML is ~10MB
    # and gzip brings it down to ~2-3MB.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Upstream: TiddlyWiki main server ──────────────────────────────
    upstream tw_backend {
        server cpl:8080;
        keepalive 16;
    }

    # ── Upstream: maintenance loading page (startup only) ─────────────
    upstream maintenance_backend {
        server cpl:8081;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # ── Dynamic backend selection based on maintenance flag ───────
        # /tmp/cpl-maintenance-active is a flag file created by the
        # entrypoint during startup and removed when TiddlyWiki is ready.
        # Shared between containers via Docker volume.
        set $backend tw_backend;
        if (-f /tmp/cpl-maintenance-active) {
            set $backend maintenance_backend;
        }

        # ── Maintenance redirect ─────────────────────────────────────
        # When maintenance flag exists, serve the maintenance page directly
        location @maintenance {
            proxy_pass http://maintenance_backend;
            proxy_set_header Host $host;
        }

        # ── Cache headers for static repo files ──────────────────────
        location /repo/ {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=300" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── API endpoints ─────────────────────────────────────────────
        # Gzip is already enabled globally for application/json.
        # Cache strategy:
        #   auth/*          → no-store (user-specific, OAuth callback sets cookies)
        #   stats/*         → TW sets max-age=60 (public, safe to cache)
        #   changelog/*     → TW sets max-age=3600 (public, safe to cache)
        #   build-status    → TW sets no-cache
        #   comments/*      → short cache for GET lists, no cache for POST
        #   compatibility/* → short cache for GET lists, no cache for POST
        #   download/*,rate/* → POST only, no caching
        #
        # NOTE: X-Forwarded-Proto is hardcoded to "https" because frpc
        # terminates TLS and connects to nginx via HTTP, so $scheme is
        # always "http". The site is always accessed via HTTPS publicly.
        location /cpl/api/ {
            proxy_pass http://tw_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Auth: NEVER cache (user-specific data + OAuth callback sets cookies)
            location ~ ^/cpl/api/auth/ {
                proxy_pass http://tw_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_hide_header Cache-Control;
                add_header Cache-Control "no-store" always;
                add_header X-Content-Type-Options "nosniff" always;
            }

            # Comments & compatibility: short cache for list endpoints
            location ~ ^/cpl/api/(comments|compatibility)/ {
                proxy_pass http://tw_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_hide_header Cache-Control;
                add_header Cache-Control "public, max-age=60" always;
            }
        }

        # ── Homepage: gzip + cache ────────────────────────────────────
        # TW doesn't send ETag/Last-Modified/Content-Length, so browser
        # refresh (F5) always re-downloads. max-age=300 caches for
        # normal SPA navigation (back/forward, link clicks within 5 min).
        # For true 304 support, TW server needs to generate ETag.
        location = / {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=300" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Served-By "nginx" always;
        }

        # ── Everything else ───────────────────────────────────────────
        location / {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Health check ─────────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
